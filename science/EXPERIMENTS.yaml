EXP_0_BO_ABLATION_V1:
  status: PLANNED
  designed: 2026-07-09
  pillar: MEASUREMENT
  eig_rank: 1
  scientific_question: >
    Does the bilateral oracle add over simple correctness labels?
    Specifically: does requiring CTX_DEP items to be correct with context
    (not just wrong without) produce a higher Fisher probe AUROC than
    using all "wrong without context" items (CTX_DEP + CONFAB)?
  hypothesis: >
    Bilateral oracle labels (PARAM vs CTX_DEP) produce higher Fisher probe AUROC
    than correctness-only labels (PARAM vs wrong_nocontext_any_reason) on the same
    pool, because the bilateral oracle filters out CONFAB items that pollute the
    CTX_DEP signal with a different geometric signature.
  design: >
    Phase 1: Collect PARAM items (N=100), CTX_DEP items (N=100), and CONFAB items
    (N=100: wrong without context AND wrong with context) from TriviaQA pool.
    Phase 2a: Train Fisher+PCA64 probe on PARAM vs CTX_DEP (bilateral oracle labels).
    Phase 2b: Train Fisher+PCA64 probe on PARAM vs (CTX_DEP + CONFAB) (correctness labels).
    Phase 3: Compare AUROC on held-out test items from each label scheme.
    Also: bootstrap CI to test significance of AUROC difference.
  model: Qwen/Qwen2.5-1.5B-Instruct
  n_per_class: 100
  pool_size: 15000
  probe: fisher_lda_pca64
  layer_idx: 26
  gpu: T4
  estimated_hours: 3
  kill_criterion: >
    If AUROC difference (bilateral - correctness) < 0.02 AND CI overlap is complete:
    bilateral oracle protocol advantage not established on this architecture.
    Triggers Paper C pivot.
  decision_tree:
    bilateral_AUROC_exceeds_correctness_by_gt_0.05: >
      Bilateral oracle adds over correctness labels. Protocol contribution confirmed.
      Paper A/B proceeds as planned.
    difference_lt_0.02: >
      Paper C pivot. Bilateral oracle = correctness relabeling (stricter sampling).
    correctness_AUROC_exceeds_bilateral: >
      Unexpected. Investigate why CONFAB items improve probe rather than hurt it.
  accounts: [chakrivijayrao]

EXP_1_BASELINE_COMPARISON_V1:
  status: PLANNED
  designed: 2026-07-09
  pillar: MEASUREMENT
  eig_rank: 2
  scientific_question: >
    Does Fisher+PCA64 at L2 add over output-space baselines (verbalized uncertainty,
    self-consistency, top-1 calibration score)?
  design: >
    On existing CC/CW dataset (Qwen2.5-1.5B-Instruct, N=100/class, entropy-matched).
    Compute for each item:
    (a) Fisher+PCA64 L26 step-1 AUROC (existing C017 result: 0.854)
    (b) Verbalized uncertainty: prompt model "How confident are you in your answer?
        Rate 1-5" — AUROC on the rating
    (c) Self-consistency: generate N=5 samples, compute majority vote agreement score
    (d) Top-1 probability: softmax probability of first output token
    (e) Combined LR: LR on [Fisher, -entropy, top1_prob, self_consistency]
    Compare each to Fisher AUROC within entropy-matched CC/CW zone.
  model: Qwen/Qwen2.5-1.5B-Instruct
  n_per_class: 100
  cc_cw_data: existing_exp_a_collection
  baselines: [verbalized_uncertainty, self_consistency_n5, top1_probability]
  gpu: T4
  estimated_hours: 4
  kill_criterion: >
    If any single output-space baseline achieves AUROC within 0.05 of Fisher (0.854)
    within the entropy-matched zone: Fisher's contribution over output baselines
    is not established.
  decision_tree:
    Fisher_exceeds_all_baselines_by_gt_0.05: >
      Paper A/B narrative intact. "Hidden states carry signal that outputs don't."
    one_baseline_within_0.05: >
      Paper characterizes Fisher as marginally additive. Lead with bilateral oracle
      protocol as primary contribution.
    any_baseline_gte_fisher: >
      Paper B only. Fisher is not a contribution beyond the bilateral oracle itself.
  accounts: [chakrivijayrao]

