      Fisher+PCA64 AUROC >= 0.65 AND entropy AUROC <= 0.55 → hidden states carry
      confabulation signal that output entropy does not. This would establish that
      confabulation changes the internal geometry, not just the output distribution.
    protocol_fingerprint:
      label_type: entropy_matched_confident_correct_vs_confident_wrong
      confident_zone: "step1_entropy < 30th_percentile"
      oracle_thresholds:
        correct: "nocontext_F1 >= 0.50"
        wrong:   "nocontext_F1 <= 0.05"
      phase1_bilateral_oracle: true
      phase2_pool_size: 15000
