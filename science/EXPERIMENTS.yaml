  # ── TRAJECTORY EXPERIMENTS ────────────────────────────────────────────────────

  - id: EXP_D_ENTROPY_TRAJECTORY_V1
    title: "EXP-D — Entropy Trajectory V2 (Temporal Confabulation Signature)"
    status: COMPLETE
    date: "2026-07-06"
    elapsed_s: 16557
    script_version: v2
    script: "experiments/entropy_trajectory_v1/entropy_trajectory_v1.py"
    kaggle_kernel: "chakrivijayrao/entropy-trajectory-v1"
    scientific_question: >
      Does entropy trajectory across generation steps 0-14 carry a distinguishable
      signature for confabulated vs correct answers, among CONFIDENT items where
      step-1 entropy is matched? EXP-A tests step-1 only; EXP-D asks whether the
      temporal evolution of entropy carries signal that step-1 lacks.
    hypothesis: >
      Confabulation shows a dip-then-rise entropy pattern (initial overconfidence
      then forced correction), while correct items maintain flat low entropy.
      Trajectory LR AUROC >= 0.65 on full trajectory vector would establish
      confabulation as a temporally extended process observable in entropy.
    protocol_fingerprint:
      label_type: entropy_matched_confident_correct_vs_confident_wrong
      confident_zone: "step1_entropy < 30th_percentile"
      oracle_thresholds:
        correct: "nocontext_F1 >= 0.50"
        wrong:   "nocontext_F1 <= 0.05"
      n_steps: 15
      pool_size: 15000
      n_target_per_class: 100
      features: ["per_step_entropy", "trajectory_vector", "slope", "AUC", "min", "max", "std"]
      probes: ["per_step_AUROC_curve", "trajectory_LR", "features_LR"]
      dip_rise_test: true
      dip_rise_split_step: 5
      train_frac: 0.75
      dataset: triviaqa
      model: "Qwen/Qwen2.5-1.5B-Instruct"
    decision_gate:
      TRAJECTORY_SIGNAL:  "trajectory_auroc >= 0.65"
      LATE_STEP_SIGNAL:   "per_step_auroc at any t>=3 >= 0.65"
      FEATURES_SIGNAL:    "features_auroc >= 0.65"
      DIP_RISE_SIGNATURE: "dip-then-rise in CW but not CC"
      TRAJECTORY_BLIND:   "all <= 0.55 throughout"
    key_results:
      pass1:
        pool_scanned: 7993
        theta_conf: 1.1043
        cc_candidates: 186
        cw_candidates: 649
        cc_entropy_mean: 0.563
        cw_entropy_mean: 0.668
        entropy_gap: 0.105
      pass2:
        n_cc: 100
        n_cw: 100
        pass2_elapsed_s: 126
      analysis:
        trajectory_auroc: 0.7296
        features_auroc: 0.6208
        max_per_step_auroc: 0.6174
        best_step: 4
        per_step_auroc: [0.3309, 0.4416, 0.457, 0.5531, 0.6174, 0.5783, 0.5704, 0.5637,
                         0.5004, 0.4853, 0.4692, 0.4718, 0.5257, 0.5192, 0.4858]
        cc_mean_trajectory: [0.7514, 0.9034, 0.7226, 1.2081, 1.5675, 1.455, 1.2981,
                              1.2349, 1.0484, 0.982, 0.808, 0.7661, 0.8599, 0.8681, 0.9098]
        cw_mean_trajectory: [1.0068, 1.199, 0.8996, 1.0595, 1.0267, 1.0557, 0.8466,
                              0.876, 0.9677, 1.0236, 0.9173, 0.9281, 0.7238, 0.7466, 1.0062]
        dip_rise_cc: true
        dip_rise_cw: true
        dip_rise_differential: false
        script_verdict: TRAJECTORY_SIGNAL
    interpretation: >
      TRAJECTORY_SIGNAL: trajectory LR AUROC=0.730 exceeds 0.65 threshold.
      Key shape: INVERSION between steps 0 and 4. At step 0, CW > CC in entropy
      (per-step AUROC=0.331, below chance). By step 4, CC entropy surges to 1.568 vs
      CW=1.027 (per-step AUROC=0.617). LR on full 15-vector captures this shape
      difference → AUROC=0.730. The correct-answer trajectory shows a low-entropy
      first token (highly certain key fact word) followed by a sharp entropy burst
      (elaboration uncertainty). Confabulated answers spread uncertainty more evenly
      — no burst. Dip-then-rise is NOT a differential signature (both classes show it
      by design since all items are in the confident zone with low step-0 entropy).
      CAVEAT: CC step-0 entropy mean=0.563 vs CW=0.668 (gap=0.105, larger than EXP-A's
      0.037). Some trajectory AUROC is driven by level difference. But per-step
      inversion (0.331 → 0.617) confirms shape carries independent signal.
    new_claims:
      C019: >
        Entropy trajectory across 15 generation steps distinguishes CONFIDENT_CORRECT
        from CONFIDENT_WRONG with LR AUROC=0.730. The signature is an inversion:
        CC items start with lower entropy (certain first-token) then burst to peak
        at step 4; CW items start higher and stay relatively flat.
    claims_tested: [C016]
    depends_on: [EXP_A_FALSE_CERTAINTY_V2]

