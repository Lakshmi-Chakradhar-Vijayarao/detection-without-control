# science/EXPERIMENTS.yaml
# Epistemic Observability Research — Experiment Registry
# =======================================================
#
# PURPOSE:
#   Protocol fingerprinting for every run. Two experiments with different
#   protocol_fingerprints are NOT directly comparable, even if they measure
#   the same thing.
#
# GOVERNANCE:
#   - Entries are IMMUTABLE once written (never edit past results).
#   - Superseded experiments get status: SUPERSEDED with superseded_by field.
#   - results_file points to results/frozen/ for completed runs.
#
# STATUS VALUES:
#   COMPLETE    — run finished, results frozen
#   SUPERSEDED  — replaced by a newer experiment with corrected protocol
#   FAILED      — run crashed or produced invalid results (reason documented)
#   PENDING     — designed but not yet run

experiments:

  # ── C3 NONLINEAR PROBE SERIES ────────────────────────────────────────────────

  - id: EXP_C3V1
    title: "Nonlinear Probe Recovery v1 — PARAM/WRONG labels"
    kaggle_kernel: "chakrivijayarao/nonlinear-probe-recovery-v1"
    date: "2026-06-15"
    status: SUPERSEDED
    superseded_by: EXP_C3V3
    failure_reason: >
      Wrong label design: PARAM vs WRONG (not bilateral oracle PARAM vs CTX_DEP).
      Base model calibration failed: only 66/800 PARAM items due to base model
      not following QA instruction format. Cannot compare base vs instruct.
    protocol_fingerprint:
      label_type: PARAM_vs_WRONG
      oracle_thresholds:
        param: "nocontext_F1 >= 0.50"
        wrong: "nocontext_F1 < 0.10"
      extraction_layer: 26
      extraction_step: 1
      probe: "fisher_lda_raw"
      dataset: triviaqa
      n_cal_target: 150
      shuffled_control: false
    results_file: null

  - id: EXP_C3V2
    title: "Nonlinear Probe Recovery v2 — Bilateral Oracle, Small N"
    kaggle_kernel: "chakrivijayarao/nonlinear-probe-recovery-v2"
    date: "2026-06-16"
    status: SUPERSEDED
    superseded_by: EXP_C3V3
    failure_reason: >
      Fisher LDA degenerate at small N: n_train=60, d=1536. Shuffled AUROC=0.713
      exceeded real AUROC=0.708 for Qwen instruct Fisher — catastrophic estimator
      failure. Also: no PCA preprocessing before Fisher, making covariance
      unidentifiable. All Fisher-based numbers from v2 are invalid.
    protocol_fingerprint:
      label_type: bilateral_oracle_PARAM_vs_CTX_DEP
      oracle_thresholds:
        param: "nocontext_F1 >= 0.50"
        ctxdep: "nocontext_F1 <= 0.05 AND withcontext_F1 >= 0.50"
      extraction_layer: 26
      extraction_step: 1
      probe: "fisher_lda_raw"
      pca_dim: null
      dataset: triviaqa
      n_cal_target: 80
      pool_size: 2000
      shuffled_control: true
    results_file: null

