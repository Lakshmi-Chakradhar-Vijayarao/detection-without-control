    date: "2026-06-17"
    script: "experiments/step_index_auroc/step_index_auroc.py"
    results_file: "results/frozen/step_index_results_v2.json"
    protocol_fingerprint:
      label_type: bilateral_oracle_PARAM_vs_CTX_DEP
      model: "Qwen/Qwen2.5-1.5B-Instruct"
      extraction_layer: 26
      extraction_steps: [0, 1, 2, 5, 10, 25]
      probe: "fisher_lda_pca64_holdout_7525"
      dataset: triviaqa
      pool: 2000
      n_labeled_per_class: 31
      n_cal: 23
      n_test: 8
      shuffled_control: true
    key_results:
      step_0:  {auroc: 0.7812, shuffled: 0.2031, n_test: 8}
      step_1:  {auroc: 0.6094, shuffled: 0.4531, n_test: 8}
      step_2:  {auroc: 0.5938, shuffled: 0.6250, n_test: 8}
      step_5:  {auroc: null, note: "0 PARAM items — EOS at step 2-4"}
      step_10: {auroc: null, note: "0 PARAM items"}
      step_25: {auroc: null, note: "0 PARAM items"}
      verdict: FLAT
    critical_confounds:
      - "n_test=8/class: AUROC resolution=1/64; values are noisy"
      - "EOS confound: PARAM items generate 1-3 tokens (short answers), terminate before step 5"
      - "Step 5+: PARAM class disappears; comparison impossible beyond step 2"
    interpretation: >
      Step-0 shows cleanest signal (AUROC=0.781, shuffled=0.203). Signal degrades
      at step-1 and collapses at step-2. Not because step-1 is privileged over step-0
      but because PARAM items (short factual answers) terminate via EOS at step 2-4,
      making the classes unbalanced. Hypothesis PEAK_AT_1 is NOT supported.
      Revised hypothesis: EARLY_PEAK_WITH_EOS_CONFOUND — signal strongest at step-0,
      decays immediately as short-answer PARAM items exhaust their generation budget.
    claims_impact:
      C006: >
        PARTIAL SUPPORT with caveats. Step-1 is not uniquely privileged — step-0
        is actually stronger. The C006 claim ("step-1 is the privileged extraction
        point") needs revision to "steps 0-1 carry the strongest signal; later steps
        are confounded by EOS in PARAM class." C006 status remains SUPPORTED (not
        CONFIRMED) pending EXP_T1D_V3 with EOS filter.
    superseded_by: EXP_T1D_STEP_INDEX_V3
    next_steps:
      - "v3: add EOS filter (only items generating >= MAX_STEPS tokens in nocontext pass)"
      - "v3: 5-fold CV instead of 75/25 hold-out to handle small n"
      - "v3: pool=4000 to get n>=60 CTX_DEP items"

  - id: EXP_T1C_BORDERLINE
    title: "Task 1.2 — Borderline Population Geometry (v4)"
    kaggle_kernel: "chakrivijayarao/borderline-population-geometry-task-1-2"
    kaggle_version: 4
    date: "2026-06-19"
    status: COMPLETE
    script: "experiments/borderline_geometry/borderline_geometry.py"
    results_file: "results/frozen/borderline_geometry_results_v4.json"
    hypothesis: >
      Hidden states form a continuous manifold from STRONG_PARAM through BORDERLINE
      to STRONG_CTX_DEP, suggesting bilateral oracle binary labels are thresholding
      a continuous latent accessibility variable.
    verdict: DISCRETE_CLUSTERS
    hypothesis_outcome: REJECTED  # geometry is bimodal, not a smooth gradient
    protocol_fingerprint:
      label_type: five_group_borderline
      model: qwen25_1.5b_instruct
      groups:
        STRONG_PARAM: "nocontext_F1 in [0.50, 1.01)"
        WEAK_PARAM: "nocontext_F1 in [0.15, 0.50)"
        BORDERLINE: "nocontext_F1 in [0.05, 0.15)"
        STRONG_CTX_DEP: "nocontext_F1 in [0.00, 0.05) AND withcontext_F1 >= 0.50"
        WEAK_CTX_DEP: "nocontext_F1 in [0.00, 0.10) AND withcontext_F1 >= 0.20"
      n_per_group: 60
      pool_size: 5000
      extraction_layer: 26
      extraction_step: 1
      probe_train_on: [STRONG_PARAM, STRONG_CTX_DEP]
      probe_apply_to: all_groups
      probe: fisher_lda_pca64
    key_results:
      train_auroc: 0.9631
      group_means:
        STRONG_PARAM: +1.316
        WEAK_PARAM: +0.073
        BORDERLINE: -0.278
        WEAK_CTX_DEP: -0.269
        STRONG_CTX_DEP: -1.316
      ks_tests:
        STRONG_PARAM_vs_WEAK_PARAM: "D=0.500, p≈0 (significant)"
        WEAK_PARAM_vs_BORDERLINE: "D=0.217, p=0.120 (NOT significant)"
        BORDERLINE_vs_STRONG_CTX_DEP: "D=0.583, p≈0 (significant)"
        STRONG_CTX_DEP_vs_WEAK_CTX_DEP: "D=0.550, p≈0 (significant)"
      elapsed_s: 6332.9
      items_scanned: ~2600
    interpretation: >
      BIMODAL structure, not a continuous gradient. STRONG_PARAM (+1.316) and
      STRONG_CTX_DEP (-1.316) form clearly separated poles. WEAK_PARAM (+0.073),
      BORDERLINE (-0.278), and WEAK_CTX_DEP (-0.269) are geometrically
      indistinguishable (WEAK_PARAM vs BORDERLINE KS p=0.120, NOT significant).
      The bilateral oracle's SKIP zone corresponds to geometrically undifferentiated
      items. Note: WEAK_CTX_DEP (-0.269) and BORDERLINE (-0.278) have nearly
      identical means (Δ=0.009) — ordering inversion is noise.
    claims_impact:
      - "Adds C015: bilateral oracle geometry is bimodal not continuous"
      - "C010 unchanged (CTX_DEP/CONFAB clustering is a separate question)"

