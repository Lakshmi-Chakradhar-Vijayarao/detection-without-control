    of R1's training signal, not of commitment geometry in general.
  required_model: >
    A reasoning-capable model NOT from the DeepSeek-R1 distillation lineage.
    Candidates: Qwen independently fine-tuned on reasoning without R1 teacher,
    a model trained with MCTS/PRM process reward models, or a model fine-tuned
    on MATH/GSM8K reasoning traces from a different teacher.
  protocol: "Identical to EXP_B_REASONING_GEOMETRY_V1"
  measures: [commit_pct, z_score, commit_rate]
  n_target: 100
  gpu: T4_or_A100
  estimated_hours: 6
  claims_tested: [C022]
  verdict_criteria: >
    If COMMITTED_EARLY (commit_pct ≥ 70%, z ≥ 5): C022 strengthens — early commitment
    is not teacher-specific. Promotes C022 toward architecture-invariant claim.
    If NOT committed early: C022 is teacher-specific, not architecture-invariant.
    C022 must be reworded to "DeepSeek-R1 distillation specifically amplifies commitment."
