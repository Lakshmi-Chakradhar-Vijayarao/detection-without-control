  - id: EXP_T1D_STEP_INDEX_V3
    title: "Task 1.1 — Step-Index AUROC Profile v3 (EOS-filtered, 5-fold CV)"
    status: COMPLETE
    kaggle_kernel: "chakrivijayarao/step-index-auroc-profile-task-1-1"
    date: "2026-06-18"
    script: "experiments/step_index_auroc/step_index_auroc.py"
    results_file: "results/frozen/step_index_results_v3.json"
    protocol_fingerprint:
      label_type: bilateral_oracle_PARAM_vs_CTX_DEP
      model: "Qwen/Qwen2.5-1.5B-Instruct"
      extraction_layer: 26
      extraction_steps: [0, 1, 2, 5, 10]
      probe: "fisher_lda_pca64_5fold_cv"
      dataset: triviaqa
      pool: 4000
      eos_filter: "min_gen_tokens=8"
      n_per_class: 44
      n_cv_folds: 5
      shuffled_control: true
    key_results:
      step_0:  {auroc: 0.6389, shuffled: 0.4772, n: 44}
      step_1:  {auroc: 0.6830, shuffled: 0.4133, n: 44}
      step_2:  {auroc: 0.7620, shuffled: 0.4966, n: 44}
      step_5:  {auroc: 0.7904, shuffled: 0.4821, n: 44}
      step_10: {auroc: 0.9056, shuffled: 0.4833, n: 16, note: "16/44 PARAM survive to step-10"}
      verdict: MONOTONE_RISE
      eos_rejected: 279
      elapsed_s: 5333.7
    critical_confounds:
      - "Step-10 n=16P/38C: PARAM items terminate more often; AUROC computed on balanced n=16"
      - "Survivor selection at step-10: the 16 surviving PARAM items are atypically verbose"
      - "EOS filter rejects 279 items — majority of TriviaQA pool generates short answers"
    interpretation: >
      For EOS-filtered verbose items (generating >=8 tokens nocontext), Fisher+PCA64
      AUROC at L26 rises MONOTONICALLY from step-0=0.639 to step-10=0.906. This is
      the OPPOSITE of the PEAK_AT_1 / DECAY hypothesis. Signal grows as generation
      proceeds. PARAM items surviving to step-10 are verbose-answer items — epistemic
      accessibility continues to be expressed through the generation trajectory.
      The step-1 vs prefill superiority (ESM v33) is a SEPARATE comparison:
      generation-onset vs prompt-processing. Within generation, signal does not decay.
    claims_impact:
      C006: >
        Partially falsifies the "decays at later steps" component of C006.
        The step-1 > prefill finding (ESM v33) is NOT affected — that comparison is
        generation-onset vs prompt-processing, not within-generation.
        C006 statement must be revised to remove "decays at later generation steps."
        New finding: within-generation AUROC RISES for verbose items (MONOTONE_RISE).
    supersedes: EXP_T1D_STEP_INDEX

  - id: EXP_T1D_STEP_INDEX
    title: "Task 1.1 — Step-Index AUROC Profile"
    status: SUPERSEDED
    superseded_by: EXP_T1D_STEP_INDEX_V3
    version: v2
    kaggle_kernel: "chakrivijayarao/step-index-auroc-profile-task-1-1"
