        bilateral_oracle_shuffled: 0.5106
        n_param: 100
        n_ctx_dep: 68
        n_skip: 4832
      phase2:
        n_cc: 100
        n_cw: 100
        theta_conf: 1.1043
        items_in_confident_zone: 2398
        cc_entropy_mean: 0.580
        cc_entropy_std: 0.313
        cw_entropy_mean: 0.617
