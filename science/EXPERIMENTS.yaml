  - id: EXP_NQ_BLIND_PREDICTION_V1
    title: "Natural Questions Blind Prediction — Law 1 Dataset Generalization"
    date_designed: "2026-07-13"
    date_prediction_locked: "2026-07-13"
    status: PENDING
    scientific_question: "Q_BLIND_1"

    pre_registered_prediction: |
      PREDICTION (locked 2026-07-13 before any NQ-Open results were seen):

      Fisher+PCA64 bilateral oracle on Natural Questions Open achieves
      L1 AUROC >= 0.70 for Qwen2.5-1.5B-Instruct at L26 step-1,
      with N >= 150/class and a clean shuffled control
      (shuffled AUROC < real AUROC - 0.05).

      Rationale: Law 1 states O >= 0.70 for any instruction-tuned transformer
      in the Goldilocks zone on factoid QA. NQ-Open is single-hop factoid QA
      with short answers, the same format class as TriviaQA. If Law 1 is a
      dataset-general claim (not TriviaQA-specific), it must hold here.

      Expected range: 0.68 - 0.82 (NQ answers are typically shorter and the
      model's parametric hit rate may differ from TriviaQA, yielding a
      different difficulty distribution but the same signal structure).

      Kill criterion: AUROC < 0.65 at N >= 150/class with clean shuffled control.
      This would falsify the dataset-generalization claim in Law 1 and force
      reformulation as: "Law 1 is TriviaQA-specific."

      NOTE: The probe IS retrained on NQ items (fresh bilateral oracle).
      This tests signal existence on NQ, not cross-dataset probe transfer.
      Cross-dataset transfer (TriviaQA probe → NQ items) is the stronger claim
      and would require a separate experiment.

    scientific_motivation: >
      The three-task framework's credibility requires that the signal generalizes
      across datasets within the same task family (single-hop factoid QA).
      If Law 1 only holds on TriviaQA, the framework is dataset-specific, not
      a property of epistemic state. NQ-Open is the closest available dataset
      to TriviaQA (same question structure, same answer format, same task type).
      A confirmed result here promotes Law 1 from dataset-specific to dataset-family-general.

    protocol_fingerprint:
      label_type: bilateral_oracle_PARAM_vs_CTX_DEP
      oracle_thresholds:
        param: "nocontext_F1 >= 0.50"
        ctxdep: "nocontext_F1 <= 0.05 AND withcontext_F1 >= 0.50"
      extraction_layer: 26
      extraction_step: 1
      probe: "fisher_lda_pca64"
      pca_dim: 64
      dataset: "nq_open"
      dataset_split: "validation"
      model: "Qwen/Qwen2.5-1.5B-Instruct"
      n_per_class_target: 200
      pool_size: 3600
      shuffled_control: true
      bootstrap_n: 1000
      seed: 42

    verdict_mapping:
      LAW1_GENERALIZED: "AUROC >= 0.70, shuffled CLEAN"
      LAW1_WEAK: "AUROC in [0.65, 0.70), shuffled CLEAN"
      LAW1_FALSIFIED_FOR_NQ: "AUROC < 0.65 at N >= 150/class"
      PROTOCOL_FAILURE: "N_collected < 100/class (NQ oracle yield too low)"

