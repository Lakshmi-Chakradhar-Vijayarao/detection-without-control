      massive commitment (jump to 74.5% average).

      The z-score difference (679 vs 50) is large. Llama backbone shows stronger
      and more consistent early commitment than Qwen backbone. Cal AUROC=1.000
      vs 0.760 confirms cleaner separation in Llama hidden states at L28.

      EXP-B+C together establish: reasoning distillation produces early-committing
      models regardless of backbone family. The think block is justification
      (post-decision elaboration), not search (pre-decision exploration).
    new_claims:
      C022: >
        Early commitment is architecture-invariant across reasoning-distilled
        transformer families. Qwen 1.5B (z=49.77, commit%=75.8%) and Llama 8B
        (z=679.73, commit%=82.9%) both show COMMITTED_EARLY. The reasoning chain
        in distilled reasoning models is primarily post-commitment elaboration,
        not pre-decision search. This holds across at least two independent
        transformer families.
    claims_tested: [C006, C007]
    depends_on: [EXP_B_REASONING_GEOMETRY_V1]

EXP_J_PERTURBATION_V1:
  status: PLANNED
  designed: 2026-07-07
  scientific_question: "Are measured signals (Fisher trajectory, entropy, commit_pct) stable across prompt variants, or are they prompt artifacts?"
  why: >
    All prior experiments use one fixed prompt per question. If Fisher, entropy,
    and commit_pct change substantially across paraphrases, reorderings, or
    translations of the same question, the signals reflect prompt surface features
    not internal computation. This is the invariance test the program needs before
    claiming generalizability.
  design:
    n_questions: 50
    n_variants_per_question: 5
    variants:
      - paraphrase_A: "same content, different wording (GPT-4 or manual)"
      - paraphrase_B: "minimal rephrasing"
      - reordered: "question before vs after context"
      - distractor: "add one irrelevant sentence to context"
      - multilingual: "French translation"
    measures: [fisher_score_L26_step1, entropy_step1, commit_pct_if_reasoning_model]
    models: [Qwen2.5-1.5B-Instruct, Llama-3.2-3B-Instruct]
    metric: "within-question variance of each measure vs across-question variance"
  kill_criterion: >
    Within-question signal variance >= 50% of across-question signal variance
    -> signals reflect prompt artifacts, not internal computation.
    -> All generalizability claims require major qualification.
  success_criterion: >
    Within-question signal variance << across-question signal variance
    -> signals are computation-level, not prompt-surface-level.
    -> Supports invariant framing and cross-language extension.
  priority: HIGH (required before paper submission)
  gpu: T4
  estimated_hours: 5
  accounts: [chakrivijayarao]

EXP_L_TRAINING_STAGES_V1:
  status: PLANNED
  designed: 2026-07-07
  revised: 2026-07-07
  pillar: DYNAMICS
  scientific_question: >
    How does computational observability change across the full training trajectory?
    Discovery orientation — no pre-specified hypothesis on direction.
  why: >
    EXP-B and EXP-C show z-score amplification from base to reasoning-distilled
    models (base z=7 → reasoning z=50–679). But this pattern confounds five
    variables: training objective, distillation method, teacher identity,
    backbone architecture, and reasoning token budget. EXP-L resolves this by
    holding architecture constant and measuring CONTINUOUSLY across checkpoints,
    not just at four discrete stages.
  design:
    orientation: DISCOVERY (not hypothesis confirmation)
    backbone: "Pythia-1.4b preferred (open checkpoints at all 143 training steps)"
    continuous_measurement: true
    checkpoints: "All available checkpoints from step 512 to step 143000 (up to 143 points)"
    why_continuous: >
      Four discrete snapshots (base/SFT/RLHF/reasoning) is too coarse for law discovery.
      With 143 measurement points you can fit dO/dt = f(loss(t), compute(t)) and ask
      what differential equations describe Observability(t). That converts a pattern
      into a law. This is what separates Era 1 measurement from Era 2 law discovery.
    measures_per_checkpoint:
      - fisher_auroc_bilateral_oracle
      - entropy_auroc_bilateral_oracle
      - commit_pct_mean
      - z_score
      - trajectory_stability
    protocol: "Bilateral oracle at each checkpoint. Same pool, same thresholds."
    n_target_per_checkpoint: 50
    pool_per_checkpoint: 3000
  competing_theory_predictions:
    information_bottleneck: >
      INVERTED_U shape: O(t) rises from step 512, peaks at maximum compression
      (estimated step 16k–33k), then decays partially at convergence. Peak
      predicted at ~25% through total training compute. dO/dt > 0 early,
      dO/dt < 0 late.
    routing_optimization: >
      MONOTONE_RISE: O(t) grows continuously, reaching near-asymptote by
      step 100k. dO/dt > 0 throughout, decelerating late.
    architectural_determination: >
      FLAT: O(t) variance < 0.02 across all checkpoints. Step 512 ≈ step 143000.
      Observability is determined by architecture (GPTNeoX attention), not training.
    predictive_coding: >
      PHASE_TRANSITION: O(t) low until model achieves coherent prediction (~step 4k),
      then rapid rise, then plateau. Step function shape.
  kill_criterion: >
    FLAT (variance < 0.02 across all checkpoints) on both Fisher AUROC and
    entropy AUROC → observability is architecturally determined, not learned.
    Kills the training dynamics arc hypothesis entirely. Also kills EXP-L follow-on
    training intervention rationale.
  priority: HIGHEST (bridge from Measurement to Laws; required before training intervention)
  post_training_stages: >
    If Pythia confirms a dynamics pattern, run the same measurement on
    Qwen 2.5 family if SFT/RLHF checkpoints are available. This adds post-training
    stages (SFT, RLHF, reasoning distillation) to the pretraining curve.
  note: >
    Continuous measurement requires either public open-checkpoint model (Pythia: YES)
    or training infrastructure. Pythia-1.4b has public checkpoints at all 143 steps.
    EXP-K v3 is the Kaggle pilot (8 checkpoints). EXP-L is the full continuous sweep.
    EXP-L scale: 143 checkpoints × ~30min/checkpoint = ~72h. Requires A100 or equivalent.
    Design now, run when compute is available. Do not wait for compute to design.
  gpu: A100_preferred
  estimated_hours: 72
  accounts: [chakrivijayarao]
  compute_decision_required: true
  competing_explanations_resolved:
    - training_objective: PARTIAL (continuous training sweep only; SFT/RLHF/reasoning separate)
    - distillation_method: NOT_APPLICABLE (pretraining only for Pythia)
    - teacher_identity: NOT_APPLICABLE
    - backbone: YES (held constant — Pythia-1.4b)
    - reasoning_token_budget: NOT_APPLICABLE (base model)

