      broadly rather than CTX_DEP specifically.
    status: EXPLORATORY
    evidence:
      - experiment: EXP_DIMENSIONALITY
        result: "CTX_DEP≈CONFAB geometrically (both parametric failure). Dim1=0.359 (routing confidence)."
    notes: >
      This could be a finding (geometry correctly captures parametric failure) or a
      limitation (probe can't distinguish CTX_DEP from CONFAB). Borderline geometry
      (EXP_T1C_BORDERLINE) shows STRONG_CTX_DEP is a distinct negative pole but
      WEAK_CTX_DEP clusters with BORDERLINE — consistent with a parametric-failure
      geometry that is not finely graded.
    paper_sections: []
    last_updated: "2026-06-20"

  - id: C015
    statement: >
      Bilateral oracle Fisher+PCA64 geometry is BIMODAL rather than a continuous
      gradient. STRONG_PARAM (+1.316) and STRONG_CTX_DEP (-1.316) form distinct poles
      (KS D≥0.50, p≈0 for STRONG vs adjacent WEAK). WEAK_PARAM, BORDERLINE, and
      WEAK_CTX_DEP are geometrically indistinguishable (WEAK_PARAM vs BORDERLINE:
      KS D=0.217, p=0.120, NOT significant). The bilateral oracle SKIP zone corresponds
      to an amorphous middle region with no geometric gradient.
    status: SUPPORTED
    evidence:
      - experiment: EXP_T1C_BORDERLINE
        model: qwen25_1.5b_instruct
        result: >
          Group means: STRONG_P=+1.316, WEAK_P=+0.073, BORDERLINE=-0.278,
          WEAK_C=-0.269, STRONG_C=-1.316. Train AUROC=0.9631.
          KS(STRONG_P vs WEAK_P): D=0.500, p<0.0001.
          KS(WEAK_P vs BORDERLINE): D=0.217, p=0.120 (NOT significant).
          KS(BORDERLINE vs STRONG_C): D=0.583, p<0.0001.
          KS(STRONG_C vs WEAK_C): D=0.550, p<0.0001.
          Verdict: DISCRETE_CLUSTERS (BIMODAL). N=60/group. Elapsed: 6332.9s.
    notes: >
      Single architecture (Qwen2.5-1.5B-Instruct), N=60/group (below CONFIRMED threshold
      of ≥128/class). Promoted from EXPLORATORY to SUPPORTED: clean N=60/group Kaggle run
      2026-07-03 reproduces prior result to decimal (pole means ±1.316 confirmed).
      The "NOT in expected order" script warning is noise: BORDERLINE (-0.278) and
      WEAK_CTX_DEP (-0.269) differ by 0.009 against std≈0.7 — they're the same point.
      Core finding: two genuinely distinct epistemic poles at ±1.316; items between them
      (WEAK_PARAM, BORDERLINE, WEAK_CTX_DEP) are geometrically indistinguishable.
      Replication needed on Llama and at larger N (large_n_validation) for CONFIRMED.
    needs_replication: true
    replication_experiment: "EXP_T1A_LARGE_N (large_n_validation) + Llama run"
    paper_sections: []
    last_updated: "2026-07-03"

  - id: C011
    statement: >
      Epistemic legibility (bilateral oracle AUROC) changes predictably during LLM
      training, observable as a monotone increase across Pythia checkpoints from
      initialization to convergence.
    status: EXPLORATORY
    evidence:
      - experiment: EXP_T3A_PYTHIA
        model: pythia-1.4b (EleutherAI)
        result: >
          8 checkpoints (step512 → step143000), Mode A training dynamics.
          AUROCs: 0.8594, 0.9259, 0.8776, 0.8594, 0.6790, 0.7755, 0.7200, 0.7200.
          Script verdict: INVERTED_U (peak at step2000=0.9259, decline to 0.72 at convergence).
          Floor finding: AUROC ≥ 0.67 at all checkpoints. All shuffled controls ≤ 0.67.
          WARN flags at step16000 (shuffled=0.672) and step64000 (shuffled=0.633) — small-N
          overfit. n_test=7-9/class per checkpoint (CIs ≈ ±0.20).
    notes: >
      MONOTONE_GROWTH claim (C011 as stated) is NOT confirmed — pattern is INVERTED_U,
      not monotone. However two robust sub-findings emerge:
      (1) FLOOR FINDING: AUROC ≥ 0.67 at every checkpoint step512–step143000.
      Bilateral oracle geometry is present from earliest training. Legibility is not
      a late-emergent phenomenon. All shuffled controls ≤ 0.67 (no overfit signal in
      reliable cells).
      (2) SHAPE (provisional): Early checkpoints (step512–8000: 0.86–0.93) appear higher
      than convergent checkpoints (step128000–143000: 0.72). If real: geometry is
      strongest in early-middle training, not at convergence. This could reflect that
      early PARAM items are answered by surface patterns (different from epistemic routing
      at convergence), not that epistemic legibility peaks early.
      CAUTION: n_test=7-9/class per checkpoint → CIs ≈ ±0.20. Cannot distinguish INVERTED_U
      from NOISY at this sample size. A large-N sweep (N≥50/class per checkpoint) is required
      to characterize the curve reliably.
      DO NOT upgrade beyond EXPLORATORY until large-N replication run.
    needs_replication: true
    replication_experiment: "EXP_T3A_PYTHIA_LARGE_N (N≥50/class, same 8 checkpoints)"
    paper_sections: []
    last_updated: "2026-07-05"

  - id: C016
    statement: >
      Output token entropy at generation step-1 achieves AUROC 0.9043 (Qwen2.5-1.5B-Instruct,
      N=121/class, test=31/class) and 0.874 (Llama-3.2-3B-Instruct, N=150/class, test=38/class)
      for bilateral oracle PARAM/CTX_DEP classification on TriviaQA — substantially equal to
      or exceeding Fisher+PCA64 hidden-state probe performance. PARAM items: ~1.1–1.2 nats;
      CTX_DEP items: ~2.4–3.3 nats (2–3× gap across both architectures).
    status: SUPPORTED
    evidence:
      - experiment: EXP_ENTROPY_BASELINE
        model: qwen25_1.5b_instruct
        result: "Entropy-raw AUROC=0.9043, Entropy-LR AUROC=0.9043. PARAM=1.187 nats, CTX_DEP=2.399 nats. N=121/class, test=31/class."
      - experiment: EXP_ENTROPY_BASELINE
        model: llama3.2_3b_instruct
        result: "Entropy-raw AUROC=0.8740, Entropy-LR AUROC=0.8740. PARAM=1.114 nats, CTX_DEP=3.329 nats. N=150/class, test=38/class."
    notes: >
      Entropy is a simple output-logit measurement requiring no probe training, no hidden-state
      extraction beyond the output head, and no PCA/LDA fitting. That it achieves AUROC 0.87–0.90
      means bilateral oracle labels are primarily a confident/uncertain distinction.
      The combined predictor (LR on [Fisher, -entropy]) outperforms entropy alone for Llama
      (0.9037 vs 0.874, Δ=+0.030), suggesting a small independent hidden-state component for
      that architecture. For Qwen, combined (0.7929) is worse than entropy alone (0.9043),
      consistent with Fisher introducing noise that disrupts the LR fit.
      Large-N replication needed (N≥197/class consistent with C001/C003). Current test sets
      (n=31-38/class) give CIs ≈ ±0.09-0.12 on entropy AUROC.
      For paper: report entropy AUROC as the natural strong baseline. Frame the bilateral oracle
      Fisher probe result (C001) in relation to this baseline — Fisher is roughly equivalent
      for Llama, substantially worse for Qwen. The bilateral oracle's methodological contribution
      (clean PARAM/CTX_DEP labeling) is independent of which predictor performs best.
    needs_replication: true
    replication_experiment: "EXP_ENTROPY_BASELINE_LARGE_N (pool=10000, N_TARGET=200)"
    paper_sections: []
    last_updated: "2026-07-05"

