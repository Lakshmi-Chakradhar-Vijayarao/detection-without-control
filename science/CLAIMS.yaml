  # ── EXPLORATORY ───────────────────────────────────────────────────────────────

  - id: C008
    statement: >
      Output token entropy and Fisher LDA decision score are orthogonal signals
      (Pearson r ≈ 0.0039), suggesting epistemic state has at least two independent
      measurable dimensions.
    status: FALSIFIED
    falsified_by:
      - experiment: EXP_STRUCTURAL_INDEP_V2
        model: qwen25_1.5b_instruct
        result: >
          Spearman r(Fisher_decision, entropy)=-0.2251, p=0.0786; Pearson r=-0.1738, p=0.177.
          n=31/class test set. Fisher AUROC not separately reported for this run.
          Mean entropy PARAM=0.9366 nats vs CTX_DEP=2.7562 nats (3× gap).
          Prior corr=0.0039 used j_score (MSCP metric), not Fisher+PCA64 decision score.
      - experiment: EXP_STRUCTURAL_INDEP_V2
        model: llama3.2_3b_instruct
        result: >
          Spearman r(Fisher_decision, entropy)=-0.5444, p<0.0001; Pearson r=-0.5543, p<0.0001.
          n=38/class test set (150/class pool, 0.75 train split). Fisher AUROC=0.8601.
          Mean entropy PARAM=1.1765 nats vs CTX_DEP=3.4466 nats (2.9× gap).
          Verdict: CORRELATED (strongly). r²≈0.307 — ~30% shared variance.
      - experiment: EXP_ENTROPY_BASELINE
        model: qwen25_1.5b_instruct
        result: >
          Fisher AUROC=0.6566 vs Entropy-raw AUROC=0.9043 vs Entropy-LR AUROC=0.9043.
          Combined (LR on [Fisher, -entropy]) = 0.7929 — WORSE than entropy alone.
          Mean entropy PARAM=1.187 nats, CTX_DEP=2.399 nats. N=121/class, test=31/class.
          Verdict: FISHER_REDUNDANT. Fisher substantially worse than entropy (Δ=−0.248).
      - experiment: EXP_ENTROPY_BASELINE
        model: llama3.2_3b_instruct
        result: >
          Fisher AUROC=0.8601 vs Entropy-raw AUROC=0.874 vs Entropy-LR AUROC=0.874.
          Combined (LR on [Fisher, -entropy]) = 0.9037 — marginal gain over either.
          Mean entropy PARAM=1.114 nats, CTX_DEP=3.329 nats. N=150/class, test=38/class.
          Verdict: FISHER_REDUNDANT. Fisher marginally below entropy (Δ=−0.014); combined
          adds +0.030 AUROC, suggesting small independent hidden-state component for Llama.
    notes: >
      FALSIFIED 2026-07-04/05 (both architectures, both correlation and AUROC baseline):
      The independence claim (r≈0) does not hold with the correct metric (Fisher+PCA64
      decision score). Correlation: Qwen r=−0.225 (r²=0.05), Llama r=−0.544 p<0.0001 (r²=0.30).
      AUROC comparison (EXP_ENTROPY_BASELINE): entropy alone achieves AUROC 0.9043 (Qwen)
      and 0.874 (Llama) — substantially equal to or exceeding Fisher (0.6566 and 0.8601).
      For Qwen, Fisher is a degraded proxy for entropy (combined=0.7929 < entropy=0.9043).
      For Llama, Fisher and entropy are roughly equivalent; combination gives marginal gain
      (0.9037 vs 0.874), consistent with a small independent hidden-state component.
      Verdict: FISHER_REDUNDANT for both architectures.
      Root cause: The bilateral oracle protocol operationalizes whether the model succeeds or
      fails without context — this is functionally a confident/uncertain distinction. PARAM
      items are answered correctly from parametric memory, generating with peaked (low-entropy)
      distributions; CTX_DEP items fail without context, generating with flat (high-entropy)
      distributions. The Fisher hidden-state probe is capturing this same confident/uncertain
      distinction, but through a noisier channel (especially for Qwen).
      The 2.4–3.3× entropy gap (PARAM: 1.1–1.2 nats vs CTX_DEP: 2.4–3.3 nats) is the
      primary driver of bilateral oracle separability. Fisher is a correlate, not an independent
      epistemic dimension.
      NOTE ON AUROC: Llama Fisher AUROC=0.8601 in these experiments uses only n=38/class test
      set — higher than the large_n_v2 primary (0.7464, N=200/class). Use large_n_v2 for
      benchmark (C001). Entropy AUROC also needs large-N replication (see C016).
      For paper: cite C008 as FALSIFIED with the FISHER_REDUNDANT result. The entropy
      discriminator (C016) should be reported as the primary strong baseline. Fisher value
      limited to "marginal independent component for Llama, none detectable for Qwen."
    paper_sections: []
    last_updated: "2026-07-05"

