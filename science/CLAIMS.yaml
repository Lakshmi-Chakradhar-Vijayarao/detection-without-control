  - id: C032
    status: SUPPORTED
    short: "CO_BETTER: correctness labeling achieves higher AUROC than bilateral oracle CTX_DEP labeling"
    claim: >
      Fisher+PCA64 at L26 step-1 on Qwen2.5-1.5B-Instruct separates PARAM from
      CO_INCORR (any wrong answer) with AUROC=0.885 (CI=[0.810, 0.947], shuffled=0.501 CLEAN),
      outperforming bilateral oracle PARAM/CTX_DEP separation by Δ=+0.079
      (BO AUROC=0.806, CI=[0.712, 0.887], shuffled=0.411 CLEAN).
      CTX_DEP items (answerable WITH context but NOT without) are geometrically
      CLOSER to PARAM items than a typical wrong-answer distribution.
      The broader CO_INCORR class (confabulation + knowledge gaps + reasoning errors)
      is MORE separated from PARAM in Fisher space.
    evidence:
      experiment: "EXP_0_BO_ABLATION_V1"
      model: "Qwen2.5-1.5B-Instruct"
      n_per_class: 200
      bo_auroc: 0.8056
      bo_ci_95: [0.712, 0.887]
      bo_shuffled: 0.411
      co_auroc: 0.8848
      co_ci_95: [0.810, 0.947]
      co_shuffled: 0.501
      delta_bo_minus_co: -0.079
      verdict: "CO_BETTER"
      date: "2026-07-09"
    mechanistic_interpretation: >
      CTX_DEP items are borderline knowledge cases — the model nearly knows them
      (fails alone, succeeds with context). These are geometrically closest to PARAM
      in Fisher space. CO_INCORR includes confabulations and complete knowledge gaps,
      which are more extreme knowledge-retrieval failures and thus more separated from PARAM.
      The bilateral oracle CTX_DEP protocol, by selecting the hardest-to-separate
      failure cases, yields LOWER AUROC than the broader CO condition.
      The Fisher geometry captures knowledge-retrieval quality across ALL failure modes,
      not only context-dependence.
    implication: >
      1. Deployment: CO-style labeling (correct vs wrong, no context pass) is sufficient
         for a strong Fisher-based confabulation detector — bilateral oracle not required.
      2. L2 redesign opportunity: Current CC/CW uses entropy-matched bilateral oracle items.
         A CO-style L2 (confident correct vs confident wrong, no entropy window) may achieve
         higher AUROC than the 0.240/0.365 gap measured under BO framing.
      3. Mechanism A (Retrieval Quality) strengthened: Fisher captures knowledge-retrieval
         success across ALL failure types, not just context-dependent ones.
    needs_replication: true
    replication_note: "Single architecture (Qwen 1.5B). Needs replication on Llama, Mistral."
