  # ── SUPPORTED ────────────────────────────────────────────────────────────────

  - id: C005
    statement: >
      Centroid-direction residual stream patching at generation step-1, across all layers
      L4–L26, produces no causal improvement in CTX_DEP F1 (specific Δ ≤ 0.000 at all
      layers; indistinguishable from shuffled direction). Extended by C024 to the CC/CW
      confabulation domain (gap 4× larger, same null result).
    status: SUPPORTED
    precision_note: >
      LANGUAGE CONSTRAINT: never describe this as "read-only geometry" or "training
      objectives don't exploit this." Those overstate the finding. The precise language is:
      "currently observed as non-causal under centroid-direction, residual-stream patching
      at the tested layers and magnitudes." This is a property of the tested interventions,
      not a property of the network. Alternative intervention families (attention head
      patching, SAE feature patching, circuit-level, training-time) remain untested.
    evidence:
      - experiment: EXP_P1V3
        model: qwen25_1.5b_instruct
        result: "Alpha=2.0 Δ=+0.0054 == shuffled Δ=+0.0054; specific_delta=0.0000"
      - experiment: EXP_P1V5
        model: qwen25_1.5b_instruct
        result: "Layer sweep L4-L24: ALL patch_Δ=0.0000, shuffled occasionally +0.0095"
      - experiment: EXP_H_CC_CW_PATCHING_V1
        model: qwen25_1.5b_instruct
        result: "CC/CW domain: max Δ_F1=+0.0004 across λ={0,0.25,0.5,1,2,4}. EPIPHENOMENAL."
    notes: >
      SCOPE: centroid-direction mean patching of residual stream only.
      NOT tested: attention head patching, SAE feature patching, circuit-level
      (MLP neuron) intervention, training-time objectives. Causal structure may be
      accessible through those mechanisms — this claim does not close those questions.
      Single architecture (Qwen). Llama patching not run.
    needs_replication: true
    replication_experiment: "Head-level patching or SAE patching if causal leverage desired"
    paper_sections: []
    last_updated: "2026-07-07"

  - id: C006
    statement: >
