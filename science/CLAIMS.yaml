# science/CLAIMS.yaml
# Computational Observability Research — Claim Registry
# ======================================================
#
# STATUS VALUES:
#   CONFIRMED   — replicated across ≥2 architectures, clean controls, N≥128/class
#   SUPPORTED   — single architecture OR N<128/class; valid but needs replication
#   EXPLORATORY — preliminary signal, insufficient evidence for paper citation
#   FALSIFIED   — directly contradicted by controlled experiment with clean controls
#
# GOVERNANCE RULES:
#   Paper sections may only reference CONFIRMED or SUPPORTED claims.
#   FALSIFIED claims must be disclosed explicitly if mentioned in paper.
#   Run `python science/validate_claims.py` before any submission draft.
#   Never delete entries — update status field only.
#
# CONFIDENCE HIERARCHY (apply before citing any claim):
#   Measured results   → Very high (AUROC numbers, z-scores, F1 values)
#   Cross-exp synthesis → High (Three-Task Hierarchy, Fisher/entropy reconciliation)
#   Mechanistic interp  → Moderate (retrieval quality axis = HYPOTHESIS not finding)
#   Future theory       → Low-moderate (laws, training arc universality)
#   Never present lower-confidence claim at same level as higher-confidence claim.
#
# ESTIMATOR INDEPENDENCE PRINCIPLE:
#   The science is not committed to any particular estimator.
#   Fisher+PCA64 is today's validated choice. Future estimators (SAEs, contrastive
#   probes, circuits) may supersede it. Claims built on Fisher that survive
#   re-measurement with a new estimator are strengthened. Claims that do not
#   survive require re-evaluation. The bilateral oracle methodology and three-task
#   hierarchy are estimator-agnostic and will survive any estimator change.

claims:

  # ── CONFIRMED ────────────────────────────────────────────────────────────────

  - id: C001
    statement: >
      Fisher+PCA64 (LDA solver=lsqr, shrinkage=auto, PCA_dim=64) applied to layer-26
      step-1 hidden states achieves AUROC ≥ 0.70 for bilateral oracle PARAM/CTX_DEP
      classification on TriviaQA. Under clean large-N sampling (pool=10k, N≥197/class),
      Qwen2.5-1.5B-Instruct achieves AUROC=0.7312, CI=[0.6256, 0.8283], shuffled=0.5980
      (CLEAN). Earlier calibration-phase estimate of 0.841 was inflated by dataset
      ordering artifact (shuffled=0.617 WARN) and is superseded.
    status: CONFIRMED
    evidence:
      - experiment: EXP_LARGE_N_V2
        model: qwen25_1.5b_instruct
        result: "AUROC=0.7312, CI=[0.6256,0.8283], shuffled=0.5980 (CLEAN), N=197/class, pool=10000. PRIMARY ESTIMATE."
      - experiment: EXP_LARGE_N_V2
        model: llama3.2_3b_instruct
        result: "AUROC=0.7464, CI=[0.6471,0.8326], shuffled=0.5016 (CLEAN), N=200/class, pool=10000. PRIMARY ESTIMATE."
      - experiment: EXP_LARGE_N_V1
        model: qwen25_1.5b_instruct
        result: "AUROC=0.6566, CI=[0.52,0.79], N=121/class (smaller pool, consistent lower bound)"
      - experiment: EXP_C3V3
        model: qwen25_1.5b_instruct
        result: "AUROC=0.841, shuffled=0.617 (WARN — ordering bias), n_per_class=128. SUPERSEDED."
      - experiment: EXP_C3V3
        model: llama3.2_3b_instruct
        result: "AUROC=0.846, shuffled=0.427 (CLEAN), n_per_class=150. SUPERSEDED by large_n_v2."
    notes: >
      THRESHOLD REVISED 2026-07-03: from ≥0.82 to ≥0.70 based on large_n_v2 clean results
      on both architectures. Qwen=0.7312, Llama=0.7464, Δ=0.015 (CIs overlap).
      Both shuffled controls CLEAN (Qwen=0.598, Llama=0.502).
      Calibration-phase estimates (0.841/0.846) used smaller N and had ordering bias —
      both superseded. For paper: report both large_n_v2 numbers as the primary benchmark.
      Signal is real: both models clear 0.73 vs ≤0.60 shuffled baseline.
    paper_sections: []
    last_updated: "2026-07-03"

  - id: C002
    statement: >
      The bilateral oracle signal is linearly organized in the full representation space
      at layer 26. No nonlinear probe improves AUROC above linear Fisher by more than 0.05
      in either PCA-compressed or full space. Fisher+PCA128 is the practical optimal
      estimator (cond≈37, AUROC=0.749); PCA64 is within 0.01–0.08 depending on sample
      draw. PCA256 collapses (cond=792, AUROC=0.698) because n_components≈n_train_samples
      causes near-full-rank ill-conditioning. Full-space Fisher with shrinkage='auto' is
      best when N is large (AUROC=0.753–0.818 across two runs). PCA64 vs full cosim=0.46–0.55,
      indicating the signal spans directions not captured by top 64 PCs but the magnitude
      of loss is small (Δ≤0.08). Verdict: PCA_VALIDATED (two-run average; v1 PCA_BOTTLENECK
      at N=135 vs v2 PCA_VALIDATED at N=175 — boundary case, sample-dependent).
    status: CONFIRMED
    evidence:
      - experiment: EXP_C3V3
        model: qwen25_1.5b_instruct
        result: "best_linear=0.841, best_nonlinear=0.821, delta=-0.019 (NO_RECOVERY, within PCA64)"
      - experiment: EXP_C3V3
        model: llama3.2_3b_instruct
        result: "best_linear=0.846, best_nonlinear=0.841, delta=-0.005 (NO_RECOVERY, within PCA64)"
      - experiment: EXP_B_FULLSPACE_FISHER_V1
        model: qwen25_1.5b_instruct
        result: "N=135/class. PCA64=0.7465, PCA128=0.7760, full=0.8183, MLP=0.6522. PCA_BOTTLENECK. cosim=0.547"
      - experiment: EXP_B_FULLSPACE_FISHER_V2
        model: qwen25_1.5b_instruct
        result: "N=175/class. PCA64=0.7407, PCA128=0.7490, PCA256=0.6983(cond=792 ill-cond), full=0.7531, MLP=0.7206. PCA_VALIDATED. cosim=0.457. NO_NONLINEAR_RECOVERY confirmed."
    paper_sections: []
